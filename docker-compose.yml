version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: halandpet_user
      POSTGRES_PASSWORD: halandpet_password
      POSTGRES_DB: halandpet_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halandpet_user -d halandpet_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
